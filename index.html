  <style>
    /* Базовые стили */
    * {
      box-sizing: border-box;

      margin: 0;
      min-height: 100vh;
      background: #f4f7fb;
      color: #1f2937;
      font-family: Arial, sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 10px;
      color: #153e84;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.1;
    }

    p {
      margin: 0 0 32px;
      color: #4b5563;
      font-size: 18px;
    }

    /* Карточки заданий */
    .tasks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
    }

    .task {
      min-height: 120px;
      padding: 22px;
      border: 1px solid #d9dce2;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #ffffff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(21, 62, 132, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .task:hover {
      transform: translateY(-3px);
      border-color: #4174cb;
      box-shadow: 0 16px 32px rgba(21, 62, 132, 0.14);
    }

    .task strong {
      color: #153e84;
      font-size: 22px;
    }

    .task span {
      margin-top: 16px;
      color: #4174cb;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
